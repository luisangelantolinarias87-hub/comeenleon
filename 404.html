<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirigiendo… | Come en León</title>
  <meta name="robots" content="noindex,follow" />
  <script>
    (function () {
      var path = window.location.pathname.replace(/^\/+|\/+$/g, '').toLowerCase();

      var validRoutes = new Set([
        "tapas",
        "romantico",
        "cocido",
        "autor",
        "modernos",
        "procesiones",
        "listacofradias",
        "catedral",
        "sanisidoro",
        "botines",
        "sanmarcos",
        "musac",
        "conciertos",
        "teatro",
        "ferias",
        "mercados",
        "cookies",
        "mejor-tapa",
        "semanasanta"
      ]);

      if (validRoutes.has(path)) {
        window.location.replace('/?view=' + encodeURIComponent(path));
      } else {
        window.location.replace('/');
      }
    })();
  </script>
  <style>
    body{font-family:Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#f8fafc;color:#1e293b}
    .box{max-width:640px;padding:32px;text-align:center;background:#fff;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    a{display:inline-block;margin-top:16px;color:#fff;background:#e11d48;text-decoration:none;padding:12px 18px;border-radius:10px}
  </style>
</head>
<body>
  <main class="box">
    <h1>Redirigiendo…</h1>
    <p>Te estamos llevando a la sección correcta de Come en León.</p>
    <a href="/">Ir a la portada</a>
  </main>
</body>
</html>
